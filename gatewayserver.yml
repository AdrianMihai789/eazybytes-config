server:
  port: 8072
eureka:
  instance:
    preferIpAddress: true
  client:
    registerWithEureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: "http://localhost:8070/eureka/"
      # Our gateway server has enough details about our microservices, how it is going to get all these details is by connecting with the service discovery agent, which is Eureka.
